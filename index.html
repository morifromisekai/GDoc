<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Design Log</title>
    <meta name="description" content="A minimalist blog covering game design analysis, mechanics breakdowns, and player loops.">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/box-shadow.min.css" rel="stylesheet" integrity="sha384-*" crossorigin="anonymous" onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css';">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Responsive Navbar -->
    <nav class="navbar navbar-expand-lg navbar-minimal">
        <div class="container">
            <a class="navbar-brand-minimal" href="index.html" id="nav-brand-logo">GDOC // GAME DESIGN LOG</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center gap-3 mt-3 mt-lg-0">
                    <li class="nav-item">
                        <a class="nav-link-minimal active" href="index.html" id="nav-link-home">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link-minimal" href="blogger.html" id="nav-link-blogger">Publish</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn-toggle-theme" id="theme-toggle-btn" aria-label="Toggle theme">DARK MODE</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Header -->
    <header class="container py-5 text-center">
        <div class="row py-lg-4">
            <div class="col-lg-8 col-md-10 mx-auto">
                <h1 class="display-5 fw-bold mb-3" style="letter-spacing: -1.5px;">GAME DESIGN &amp; DECONSTRUCTIONS</h1>
                <p class="font-serif text-muted fs-5">Observations, breakdowns, and analyses on game design loops, player experiences, and the games I have played.</p>
            </div>
        </div>
    </header>

    <!-- Tag Filter Bar -->
    <section class="container mb-5">
        <div class="d-flex flex-wrap justify-content-center gap-2" id="tag-filter-container">
            <!-- Dynamic tags will be injected here -->
            <button class="badge-tag badge-tag-interactive active" id="tag-all-btn">All Posts</button>
        </div>
    </section>

    <!-- Blog Posts Cards Grid -->
    <main class="container mb-5">
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="posts-grid">
            <!-- Dynamic blog cards will be injected here -->
        </div>

        <!-- Infinite Scroll Sentinel -->
        <div id="infinite-scroll-sentinel" class="text-center py-5 d-none">
            <div class="minimal-spinner" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="container py-4 border-top border-color">
        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center text-muted fs-7">
            <div>
                &copy; 2026 Game Design Log. Built for clean reading.
            </div>
            <div class="mt-2 mt-sm-0">
                <a href="blogger.html" class="text-decoration-none text-muted">Admin Dashboard</a>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Scripts -->
    <script src="config.js"></script>
    <script>
        // Set Theme Immediately to prevent flash
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        const toggleBtn = document.getElementById('theme-toggle-btn');
        if (toggleBtn) {
            toggleBtn.textContent = savedTheme === 'dark' ? 'LIGHT MODE' : 'DARK MODE';
        }
        
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                toggleBtn.textContent = newTheme === 'dark' ? 'LIGHT MODE' : 'DARK MODE';
            });
        }
    </script>
    <script src="index.js"></script>
</body>
</html>
